<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #080808;
            --surface: #111111;
            --surface2: #1a1a1a;
            --green: #00e676;
            --green-dim: rgba(0, 230, 118, 0.12);
            --green-border: rgba(0, 230, 118, 0.3);
            --text: #f0f0f0;
            --text-dim: rgba(240, 240, 240, 0.4);
            --text-mid: rgba(240, 240, 240, 0.65);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--black);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            background: var(--black);
            z-index: 100;
        }

        .logo-wrap { display: flex; align-items: center; gap: 14px; }
        .logo-svg { width: 48px; height: 30px; }

        .logo-name {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--text);
        }

        .nav-right {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
        }

        /* Badge de agente activo */
        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            color: var(--green);
            background: var(--green-dim);
            border: 1px solid var(--green-border);
            padding: 4px 10px;
            border-radius: 50px;
        }
        .agent-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .main {
            width: 100%;
            max-width: 700px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px 60px;
        }

        .hero {
            padding: 64px 0 40px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .hero-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--green);
            text-transform: uppercase;
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.1s;
        }

        .hero-title {
            font-size: 2.2rem;
            font-weight: 300;
            line-height: 1.25;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.2s;
        }

        .hero-title strong { font-weight: 600; color: var(--green); }

        .hero-sub {
            font-size: 0.88rem;
            color: var(--text-dim);
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.3s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .messages { display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px; }

        .msg { display: flex; flex-direction: column; gap: 5px; animation: fadeUp 0.3s ease forwards; }
        .msg.user { align-items: flex-end; }
        .msg.bot  { align-items: flex-start; }

        .msg-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .msg.bot .msg-label { color: var(--green); }

        .msg-bubble {
            padding: 13px 17px;
            border-radius: 14px;
            font-size: 0.91rem;
            line-height: 1.7;
            max-width: 88%;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user .msg-bubble {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.07);
            border-bottom-right-radius: 4px;
        }

        .msg.bot .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--green-border);
            border-bottom-left-radius: 4px;
        }

        /* Fuentes usadas por el agente */
        .msg-sources {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            margin-top: 6px;
            padding: 6px 12px;
            background: var(--green-dim);
            border-radius: 8px;
            max-width: 88%;
        }
        .msg-sources a { color: var(--green); text-decoration: none; }
        .msg-sources a:hover { text-decoration: underline; }

        .typing-indicator {
            display: flex; gap: 5px;
            padding: 13px 17px;
            background: var(--surface);
            border: 1px solid var(--green-border);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,80%,100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-5px); opacity: 1; }
        }

        .chips {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.45s;
        }
        .chip {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.07);
            color: var(--text-mid);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover { border-color: var(--green-border); color: var(--green); background: var(--green-dim); }

        .input-outer {
            position: relative;
            border-radius: 18px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.55s;
        }

        .input-outer canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 18px;
            pointer-events: none;
        }

        .input-box {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px 18px;
            margin: 2px;
            position: relative;
            z-index: 1;
        }

        .input-row { display: flex; align-items: flex-end; gap: 12px; }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            resize: none;
            max-height: 130px;
            min-height: 26px;
            line-height: 1.6;
        }
        .input-field::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--green);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            color: #080808;
        }
        .send-btn:hover { background: #33ff99; transform: scale(1.08); }
        .send-btn:disabled { background: rgba(0,230,118,0.2); cursor: not-allowed; transform: none; }
        .send-btn svg { width: 14px; height: 14px; }

        .divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,230,118,0.15), transparent);
            margin: 4px 0 24px;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
            width: 100%;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="15" r="13" fill="white"/>
            <rect x="13.5" y="2" width="3" height="26" fill="#080808"/>
            <path d="M46 4 A13 13 0 1 0 46 26" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            <rect x="37" y="12.5" width="9" height="5" fill="#080808"/>
        </svg>
        <span class="logo-name">LOVA</span>
    </div>
    <div class="agent-badge">AGENTE ACTIVO</div>
</nav>

<div class="main">

    <div class="hero" id="hero">
        <div class="hero-label">Agente de IA</div>
        <h1 class="hero-title">Hola. ¿En qué puedo <strong>ayudarte</strong>?</h1>
        <p class="hero-sub">Busco en la web en tiempo real para darte respuestas actualizadas.</p>
    </div>

    <div class="messages" id="messages"></div>
    <div class="divider" id="divider" style="display:none"></div>

    <div class="chips" id="chips">
        <div class="chip" onclick="sendChip('¿Cuáles son las últimas noticias de inteligencia artificial hoy?')">🤖 Noticias de IA hoy</div>
        <div class="chip" onclick="sendChip('Dame ideas para un negocio innovador en 2025')">💡 Ideas de negocio</div>
        <div class="chip" onclick="sendChip('¿Cuál es el precio del dólar hoy?')">💵 Precio del dólar</div>
        <div class="chip" onclick="sendChip('¿Cuáles son los mejores hábitos para ser más productivo?')">⚡ Productividad</div>
        <div class="chip" onclick="sendChip('Busca las tendencias tecnológicas más importantes de este año')">🌐 Tendencias tech</div>
    </div>

    <div class="input-outer" id="inputOuter">
        <canvas id="borderCanvas"></canvas>
        <div class="input-box">
            <div class="input-row">
                <textarea
                    id="inputField"
                    class="input-field"
                    placeholder="Pregunta algo... busco en la web por ti"
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

</div>

<footer>LOVA · Agente de IA con búsqueda web · 2026</footer>

<script>
    // ── ANIMATED BORDER ──
    const canvas = document.getElementById('borderCanvas');
    const outer = document.getElementById('inputOuter');
    const ctx = canvas.getContext('2d');
    let angle = 0;

    function resizeCanvas() {
        canvas.width = outer.offsetWidth;
        canvas.height = outer.offsetHeight;
    }

    function drawBorder() {
        resizeCanvas();
        const w = canvas.width, h = canvas.height;
        const r = 18;
        ctx.clearRect(0, 0, w, h);

        const perimeter = 2 * (w + h - 4 * r) + 2 * Math.PI * r;
        const trailLen = perimeter * 0.25;

        function getPoint(dist) {
            dist = ((dist % perimeter) + perimeter) % perimeter;
            const segments = [
                { len: w - 2*r, fn: d => [r + d, 0] },
                { len: Math.PI * r / 2, fn: d => [w - r + Math.cos(-Math.PI/2 + d/r) * r, r + Math.sin(-Math.PI/2 + d/r) * r] },
                { len: h - 2*r, fn: d => [w, r + d] },
                { len: Math.PI * r / 2, fn: d => [w - r + Math.cos(d/r) * r, h - r + Math.sin(d/r) * r] },
                { len: w - 2*r, fn: d => [w - r - d, h] },
                { len: Math.PI * r / 2, fn: d => [r + Math.cos(Math.PI/2 + d/r) * r, h - r + Math.sin(Math.PI/2 + d/r) * r] },
                { len: h - 2*r, fn: d => [0, h - r - d] },
                { len: Math.PI * r / 2, fn: d => [r + Math.cos(Math.PI + d/r) * r, r + Math.sin(Math.PI + d/r) * r] }
            ];
            let acc = 0;
            for (const seg of segments) {
                if (dist <= acc + seg.len) return seg.fn(dist - acc);
                acc += seg.len;
            }
            return [r, 0];
        }

        const steps = 80;
        for (let i = 0; i < steps; i++) {
            const t = i / steps;
            const dist = (angle + t * trailLen) % perimeter;
            const [x, y] = getPoint(dist);
            const alpha = t;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI * 2);
            const color = t < 0.33
                ? `rgba(0,230,118,${alpha})`
                : t < 0.66
                ? `rgba(255,255,255,${alpha})`
                : `rgba(68,138,255,${alpha})`;
            ctx.fillStyle = color;
            ctx.fill();
        }

        angle = (angle + 3) % perimeter;
        requestAnimationFrame(drawBorder);
    }

    drawBorder();
    window.addEventListener('resize', resizeCanvas);

    // ── CHAT ──
    const WORKER_URL = "https://eagleia.clasesbeganeitor.workers.dev/";

    const SYSTEM_PROMPT = `Eres LOVA, un agente de inteligencia artificial avanzado con acceso a búsqueda web en tiempo real.
Responde siempre en español de forma clara, precisa y útil.
Cuando necesites información actualizada, busca en la web automáticamente.
Sé conversacional, empático y directo. Usa emojis con moderación.
Limita tus respuestas a lo necesario pero sé completo cuando la pregunta lo requiera.`;

    let isLoading = false;
    // Historial de mensajes para contexto multi-turno
    let messageHistory = [];

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const heroEl = document.getElementById('hero');
    const chipsEl = document.getElementById('chips');
    const dividerEl = document.getElementById('divider');

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 130) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function sendChip(text) { inputEl.value = text; sendMessage(); }

    function hideHero() {
        if (heroEl.style.display !== 'none') {
            heroEl.style.opacity = '0';
            setTimeout(() => { heroEl.style.display = 'none'; }, 300);
            chipsEl.style.display = 'none';
            dividerEl.style.display = 'block';
        }
    }

    function appendMsg(role, text, sources) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;

        let sourcesHTML = '';
        if (sources && sources.length > 0) {
            const links = sources.map(s =>
                `<a href="${s.url}" target="_blank" rel="noopener">🔗 ${s.title || s.url}</a>`
            ).join(' · ');
            sourcesHTML = `<div class="msg-sources">Fuentes: ${links}</div>`;
        }

        div.innerHTML = `<div class="msg-label">${role === 'user' ? 'TÚ' : 'LOVA'}</div><div class="msg-bubble">${text}</div>${sourcesHTML}`;
        messagesEl.appendChild(div);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'msg bot';
        div.id = 'typingIndicator';
        div.innerHTML = `<div class="msg-label">LOVA</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesEl.appendChild(div);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function removeTyping() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isLoading) return;

        isLoading = true;
        sendBtn.disabled = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';

        hideHero();
        appendMsg('user', text);
        showTyping();

        // Añadir al historial
        messageHistory.push({ role: "user", content: text });

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    system: SYSTEM_PROMPT,
                    messages: messageHistory,
                    max_tokens: 1024,
                })
            });

            const data = await response.json();
            removeTyping();

            if (data.content && data.content[0]) {
                const replyText = data.content[0].text;
                const sources = data.sources || [];
                appendMsg('bot', replyText, sources);
                // Añadir respuesta al historial
                messageHistory.push({ role: "assistant", content: replyText });
            } else {
                appendMsg('bot', '⚠️ No se pudo obtener respuesta. Intenta de nuevo.');
            }
        } catch (err) {
            removeTyping();
            appendMsg('bot', '⚠️ Error de conexión. Verifica que el Worker de Cloudflare esté activo.');
            console.error(err);
        }

        isLoading = false;
        sendBtn.disabled = false;
        inputEl.focus();
    }
</script>

</body>
</html>
